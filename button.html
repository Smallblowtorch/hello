<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>Embeddable Button</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-width: 0;
      height: 100%;
      margin: 0;
      padding: 0;
      background: transparent !important;
      background-color: transparent !important;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: stretch;
      min-height: 100vh;
    }

    /* ── Button ── */
    .embed-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #238636 0%, #2ea043 100%);
      border: none;
      border-radius: 0;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      transition: filter 0.15s ease;
    }

    .embed-button:hover {
      filter: brightness(1.12);
    }

    .embed-button:active {
      filter: brightness(0.92);
    }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(2px);
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: #1e1e1e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 24px 28px;
      max-width: 260px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      text-align: center;
      color: #e6e6e6;
    }

    .modal h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .modal p {
      font-size: 14px;
      line-height: 1.5;
      color: #aaa;
      margin-bottom: 20px;
    }

    .modal-close {
      display: inline-block;
      padding: 8px 20px;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .modal-close:hover {
      background: #2ea043;
    }
  </style>
</head>
<body>

  <button class="embed-button" id="openModal">Click Me</button>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true">
      <h2>Hello!</h2>
      <p>This is your dialog message. Replace this with whatever you'd like to say.</p>
      <button class="modal-close" id="closeModal">Close</button>
    </div>
  </div>

  <script>
    const btn = document.getElementById('openModal');
    const overlay = document.getElementById('modalOverlay');
    const closeBtn = document.getElementById('closeModal');

    btn.addEventListener('click', () => overlay.classList.add('open'));
    closeBtn.addEventListener('click', () => overlay.classList.remove('open'));
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.classList.remove('open');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') overlay.classList.remove('open');
    });
  </script>

</body>
</html>
